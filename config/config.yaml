app:
  name: "SignLens"
  version: "1.0"

camera:
  index: 0
  width: 1920
  height: 1080

mediapipe:
  detection_confidence: 0.5
  tracking_confidence: 0.5

ui:
  show_fps: true
  show_status: true
  show_prediction: true

logging:
  level: "INFO"
  file: "logs/app.log"

dataset:
  output_dir: "dataset"
  interface: "cli" # 'cli' or 'gui'
  sequence_lengths:
    static_default: 30
    dynamic_default: 45
  recording:
    countdown: 3
    auto_frames: 30
  classes:
    - "A"
    - "B"
    - "C"
